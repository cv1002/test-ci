name: "Test: Stream crash across Node versions (v22 vs v24)"

on:
  push:
  workflow_dispatch:

# Compares stream crash behavior between Node v22 (current GHA default)
# and Node v24 (explicitly installed via setup-node).

jobs:
  test-stream-crash:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["22", "24"]
    steps:
      - name: Install Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Node version
        run: node --version

      - name: "Diagnostic: error listeners after .pipe()"
        run: |
          node - << 'EOF'
          const { PassThrough } = require('stream');
          const r = new PassThrough(), w = new PassThrough();
          r.pipe(w);
          console.log('Node:', process.version);
          console.log('error listeners on readable:', r.listenerCount('error'));
          console.log('error listeners on writable:', w.listenerCount('error'));
          EOF

      - name: "Test B: v4 timer bug — destroy, no reject"
        id: test_b
        continue-on-error: true
        run: |
          node - << 'EOF'
          const { PassThrough } = require('stream');
          const response_message = new PassThrough();
          const extractStream = new PassThrough();
          response_message.pipe(extractStream);
          extractStream.on('error', () => {});
          setTimeout(() => {
            console.log('[v4] timer fired on Node', process.version);
            response_message.destroy(new Error('Blob storage chunk did not respond in 30000ms'));
          }, 200);
          new Promise(r => r()).then(() => {});  // keep event loop alive
          EOF

      - name: "Test C: v7 style — destroy + reject"
        id: test_c
        continue-on-error: true
        run: |
          node - << 'EOF'
          const { PassThrough } = require('stream');
          const response_message = new PassThrough();
          const extractStream = new PassThrough();
          response_message.pipe(extractStream);
          extractStream.on('error', () => {});
          const p = new Promise((resolve, reject) => {
            setTimeout(() => {
              console.log('[v7] timer fired on Node', process.version);
              const err = new Error('Blob storage chunk did not respond in 30000ms');
              response_message.destroy(err);
              reject(err);
            }, 200);
          });
          p.catch(() => {});
          EOF

      - name: "Test D: Real fix — .on('error') on readable"
        id: test_d
        run: |
          node - << 'EOF'
          const { PassThrough } = require('stream');
          const response_message = new PassThrough();
          const extractStream = new PassThrough();
          response_message.pipe(extractStream);
          response_message.on('error', () => {});  // THE FIX
          extractStream.on('error', () => {});
          const p = new Promise((resolve, reject) => {
            setTimeout(() => {
              console.log('[fix] timer fired on Node', process.version);
              const err = new Error('Blob storage chunk did not respond in 30000ms');
              response_message.destroy(err);
              reject(err);
            }, 200);
          });
          p.catch(err => {
            console.log('[fix] gracefully rejected:', err.message);
            console.log('No crash on Node', process.version);
          });
          EOF

      - name: Summary for Node ${{ matrix.node }}
        if: always()
        run: |
          echo "Node $(node --version) results:"
          echo "  Test B (v4, no reject):      ${{ steps.test_b.outcome }}"
          echo "  Test C (v7, destroy+reject): ${{ steps.test_c.outcome }}"
          echo "  Test D (real fix):           ${{ steps.test_d.outcome }}"

  compare:
    runs-on: ubuntu-latest
    needs: [test-stream-crash]
    if: always()
    steps:
      - name: Comparison
        run: |
          echo "See per-matrix job logs above for Node v22 vs v24 comparison"
          echo "Expected on both: B=failure, C=failure, D=success"
          echo "If behavior differs between v22 and v24, the crash is version-specific"
