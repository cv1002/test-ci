name: Demo Environment Approval

on:
  workflow_dispatch:
    inputs:
      target:
        description: '部署目标'
        required: true
        default: 'demo'
        type: choice
        options:
          - demo
          - staging

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          echo "Building project..."
          bash test.sh
          echo "Build completed!"

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: demo
      url: https://demo.example.com
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Demo Environment
        run: |
          echo "Deploying to ${{ github.event.inputs.target }} environment..."
          echo "This step runs only after the 'demo' environment is approved."
          echo "Deployment completed!"
