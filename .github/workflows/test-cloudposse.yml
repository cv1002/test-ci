name: "Test: cloudposse matrix-outputs-read on Node 22/24"

on:
  push:
  workflow_dispatch:

# Tests whether cloudposse/github-action-matrix-outputs-read crashes on
# the current GHA Node version (node20 actions forced to Node 22/24).
# Kong EE uses this action in the "Read provenance metadata" step.

jobs:
  # ── Step 1: Matrix job that writes outputs (simulates Kong's build-images) ──
  matrix-write:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        label: [amd64, arm64, s390x]
    steps:
      - name: Simulate build outputs
        id: build
        run: |
          echo "label=${{ matrix.label }}"
          echo "image_digest=sha256:$(echo ${{ matrix.label }} | sha256sum | cut -c1-64)" >> $GITHUB_OUTPUT
          echo "image_tag=test-1.0.0-${{ matrix.label }}" >> $GITHUB_OUTPUT

      - name: Write matrix outputs (cloudposse)
        uses: cloudposse/github-action-matrix-outputs-write@ed06cf3a6bf23b8dce36d1cf0d63123885bb8375
        with:
          matrix-step-name: ${{ github.job }}
          matrix-key: ${{ matrix.label }}
          outputs: |
            image_digest: ${{ steps.build.outputs.image_digest }}
            image_tag: ${{ steps.build.outputs.image_tag }}

  # ── Step 2: Read all matrix outputs (simulates Kong's provenance-metadata) ──
  matrix-read:
    runs-on: ubuntu-latest
    needs: [matrix-write]
    outputs:
      result: ${{ steps.read.outputs.result }}
    steps:
      - name: Node version (for reference)
        run: |
          echo "Node: $(node --version)"
          echo "GHA runner forces node20 actions to run on this version"

      - name: Read matrix outputs (cloudposse)
        id: read
        uses: cloudposse/github-action-matrix-outputs-read@33cac12fa9282a7230a418d859b93fdbc4f27b5a
        with:
          matrix-step-name: matrix-write

      - name: Show results
        run: |
          echo "Result: ${{ steps.read.outputs.result }}"
          echo "${{ steps.read.outputs.result }}" | python3 -m json.tool || true

  # ── Summary ──────────────────────────────────────────────────────────────────
  summary:
    runs-on: ubuntu-latest
    needs: [matrix-read]
    if: always()
    steps:
      - name: Print summary
        run: |
          echo "matrix-read result: ${{ needs.matrix-read.result }}"
          if [ "${{ needs.matrix-read.result }}" = "success" ]; then
            echo "✓ cloudposse/matrix-outputs-read SUCCEEDED on Node $(node --version)"
            echo "  (No 30s stall occurred — normal Azure Blob Storage path works fine)"
          else
            echo "✗ cloudposse/matrix-outputs-read FAILED on Node $(node --version)"
            echo "  (Check logs for crash vs normal failure)"
          fi
